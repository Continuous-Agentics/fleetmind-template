name: Terraform Plan

# Runs `terraform validate` + `terraform fmt -check` on every PR, and posts
# the `terraform plan` output as a PR comment. Apply happens manually from
# an operator workstation, not from CI.

on:
  pull_request:
    paths:
      - "**.tf"
      - "**.tfvars"
      - "fleet.yaml"
      - ".github/workflows/plan.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    name: terraform fmt + validate + plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: terraform fmt
        run: terraform fmt -recursive -check -diff

      - name: terraform init (no backend)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

      # `terraform plan` is intentionally omitted from default CI — it requires
      # AWS credentials and access to the backend state, which an operator-owned
      # template repo shouldn't assume. Enable below with a configured OIDC
      # role or AWS access key secrets.
      #
      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: arn:aws:iam::ACCOUNT:role/fleet-plan
      #     aws-region: us-west-2
      #
      # - name: terraform plan
      #   run: terraform plan -var-file=workspaces/default.tfvars
